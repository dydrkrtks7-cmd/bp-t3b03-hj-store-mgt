    <style>
        /* ===== CSS RESET & BASE ===== */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

            scroll-behavior: smooth;
            -webkit-font-smoothing: antialiased;

        body {

        h1, h2, h3, h4 {

            font-weight: 700;
            letter-spacing: -0.02em;
            text-transform: uppercase;
            word-break: break-word;
        }

        h1 {
            font-size: clamp(3.2rem, 12vw, 6.5rem);
            line-height: 0.9;
            margin-bottom: 0.3em;
            color: #ffffff;

        h2 {
            font-size: clamp(2rem, 7vw, 3.8rem);

            margin-bottom: 0.4em;

        h3 {

            line-height: 1.05;
            margin-bottom: 0.3em;
        }

        p, li, .text-body {

            font-weight: 400;
            font-size: 1rem;
            line-height: 1.6;
            color: #dddddd;
        }

        a {
            color: #ff3b00;
            text-decoration: none;
            border-bottom: 3px solid transparent;
            transition: border 0.2s;
        }
        a:hover { border-bottom-color: #ff3b00; }

        /* ===== CONTAINER / SPACE ===== */
        .container {
            max-width: 100%;
            padding: 0 72px;
            margin: 0 auto;
        }

        section, header, footer {
            padding: 72px 72px;
        }

        section + section {
            margin-top: 120px;
        }

        .gap-48 { gap: 48px; }
        .flex-h { display: flex; flex-wrap: wrap; align-items: flex-start; justify-content: space-between; }
        .flex-v { display: flex; flex-direction: column; }

        /* ===== BRUTALIST ELEMENTS ===== */
        .brutal-border {
            border: 4px solid #ffffff;
            padding: 24px;
            position: relative;
        }

        .brutal-border-accent {
            border: 4px solid #ff3b00;
            padding: 24px;
        }

        .skew-left {
            transform: skewX(-4deg);
            transform-origin: center;
        }

        .skew-right {
            transform: skewX(4deg);
            transform-origin: center;
        }

        .skew-left > *, .skew-right > * {
            transform: skewX(0deg);
        }

        .raw-texture {
            background-image: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 4px,
                rgba(255, 59, 0, 0.05) 4px,
                rgba(255, 59, 0, 0.05) 8px
            );
        }

        .overlap-left {
            margin-left: -48px;
            margin-right: 24px;
        }

        .overlap-right {
            margin-right: -48px;
            margin-left: 24px;
        }

        .full-bleed {
            margin-left: calc(-50vw + 50%);
            margin-right: calc(-50vw + 50%);
        }

        .accent-bg {
            background-color: #ff3b00;
            color: #000000;
        }

        .accent-bg h2, .accent-bg p { color: #000000; }

        /* ===== HEADER & NAV ===== */
        header {
            background: #000000;
            border-bottom: 4px solid #ff3b00;
            padding-top: 40px;
            padding-bottom: 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: relative;
            z-index: 100;
        }

        .logo {
            font-family: "Impact", sans-serif;
            font-size: 2.4rem;
            color: #ffffff;
            letter-spacing: -0.03em;
            border: 4px solid #ff3b00;

            border: none;
            font-size: 1.3rem;
            transition: background 0.2s;
        }

        .nav-cta:hover {
            background: #ffffff;
            color: #000000 !important;
            border-bottom: none !important;
        }

        .hamburger {
            display: none;
            flex-direction: column;
            gap: 8px;
            background: transparent;
            border: none;
            cursor: pointer;
            padding: 8px;
        }

        .hamburger span {
            display: block;
            width: 36px;
            height: 5px;
            background: #ffffff;
            transition: all 0.3s;
        }

        .nav-mobile {
            display: none;
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: #000000;
            border-bottom: 4px solid #ff3b00;
            padding: 40px 72px;
            flex-direction: column;
            gap: 24px;
        }

        .nav-mobile a {
            font-family: "Impact", sans-serif;
            font-size: 2rem;
            color: #ffffff;
            text-transform: uppercase;
        }

        .nav-mobile.active {
            display: flex;
        }

        /* ===== HERO SECTION ===== */
        .hero {
            padding-top: 120px;
            padding-bottom: 120px;
            position: relative;
            overflow: hidden;
            background: #000000;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                90deg,
                transparent,
                transparent 8px,
                rgba(255, 59, 0, 0.03) 8px,
                rgba(255, 59, 0, 0.03) 16px
            );
            pointer-events: none;
        }

        .hero-grid {
            display: grid;
            grid-template-columns: 1.4fr 1fr;
            gap: 48px;
            align-items: center;
            position: relative;
            z-index: 1;
        }

        .hero-left {
            position: relative;
        }

        .hero-left h1 {
            font-size: clamp(4rem, 14vw, 7rem);
            line-height: 0.85;
            margin-bottom: 16px;
            text-transform: uppercase;
        }

        .hero-left h1 .accent {
            color: #ff3b00;
            display: block;
            margin-top: -8px;
        }

        .hero-sub {
            font-family: "Impact", sans-serif;
            font-size: 1.4rem;
            color: #aaaaaa;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 40px;
            border-bottom: 4px solid #ff3b00;
            display: inline-block;

        }

            display: inline-block;
            background: #ffffff;
            color: #000000;
            font-family: "Impact", sans-serif;
            font-size: 2rem;
            padding: 20px 48px;
            border: none;
            transition: background 0.2s, color 0.2s;
            text-transform: uppercase;
            border-bottom: none;
        }

        .hero-cta:hover {
            background: #ff3b00;
            color: #ffffff;
            border-bottom: none;
        }

        .hero-right {
            background: #111111;
            padding: 48px 32px;
            border: 6px solid #ffffff;
            transform: rotate(2deg);
            position: relative;
        }

        .hero-right::before {
            content: 'NEW';
            position: absolute;
            top: -18px;
            left: 24px;
            background: #ff3b00;
            color: #000000;
            font-family: "Impact", sans-serif;
            font-size: 1.7rem;
            padding: 6px 20px;
            transform: rotate(-3deg);
            border: 3px solid #ffffff;
        }

        .hero-stats {
            display: flex;
            flex-direction: column;
            gap: 32px;
        }

        .stat-item {
            text-align: right;
        }

        .stat-number {
            font-family: "Impact", sans-serif;
            font-size: 4.5rem;
            color: #ff3b00;
            line-height: 0.9;
        }

        .stat-label {
            font-family: "Impact", sans-serif;
            font-size: 1.1rem;
            color: #ffffff;
            text-transform: uppercase;
        }

        /* ===== REVIEW CARDS ===== */
        .reviews-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 48px;
            margin-top: 48px;
        }

        .review-card {
            background: #0a0a0a;
            border: 4px solid #ffffff;
            padding: 32px 24px;
            position: relative;
            transition: border-color 0.2s;
        }

        .review-card:hover {
            border-color: #ff3b00;
        }

        .review-card::after {
            content: '“';
            font-family: "Impact", sans-serif;
            font-size: 6rem;
            color: #ff3b00;
            position: absolute;
            top: -20px;
            right: 16px;
            opacity: 0.3;
        }

        .review-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            font-size: 0.9rem;
        }

        .review-author {

            font-size: 1.2rem;
            color: #ffffff;
        }

            font-size: 1.6rem;
            letter-spacing: 4px;
            margin-bottom: 12px;
        }

        .review-text {
            color: #cccccc;
            font-size: 0.95rem;
        }

        /* ===== SECTIONS ===== */
        .section-title {
            max-width: 100%;
        }

        .content-block {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 72px;
            align-items: start;
        }

        .content-block.reverse {
            direction: rtl;
        }
        .content-block.reverse > * {
            direction: ltr;
        }

        .block-card {
            background: #0a0a0a;
            border: 4px solid #ffffff;
            padding: 48px 32px;
        }

        .block-card h3 {
            margin-bottom: 24px;
        }

        .block-list {
            list-style: none;
            padding: 0;
        }

        .block-list li {
            font-family: "system-ui", sans-serif;
            padding: 12px 0;
            border-bottom: 1px solid #222222;
            position: relative;
            padding-left: 32px;
        }

        .block-list li::before {
            content: '▶';
            position: absolute;
            left: 0;
            color: #ff3b00;
            font-size: 1rem;
        }

        .accent-block {
            background: #ff3b00;
            color: #000000;
            border: none;
            padding: 48px 32px;
        }

        .accent-block p, .accent-block h3 {
            color: #000000;
        }

        .phone-block {
            text-align: center;
            padding: 72px 32px;
            background: #111111;
            border: 6px solid #ffffff;
            transform: skewX(-2deg);
        }

        .phone-block a {
            font-family: "Impact", sans-serif;
            font-size: 3.5rem;
            color: #ffffff;
            background: #ff3b00;
            padding: 16px 48px;
            display: inline-block;
            border-bottom: none;
            transition: background 0.2s;
            margin-top: 24px;
        }

        .phone-block a:hover {
            background: #ffffff;
            color: #000000;
        }

        /* ===== FOOTER ===== */
        footer {
            border-top: 4px solid #ff3b00;
            background: #000000;
            padding-top: 72px;
            padding-bottom: 72px;
            text-align: center;
        }

        .footer-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 48px;
            margin-bottom: 48px;
            text-align: left;
        }

        .footer-col h4 {
            margin-bottom: 16px;
            color: #ff3b00;
        }

        .footer-col p, .footer-col a {
            font-family: "system-ui", sans-serif;
            color: #aaaaaa;
        }

        .footer-bottom {
            border-top: 2px solid #222222;
            padding-top: 32px;
            font-family: "system-ui", sans-serif;
            color: #666666;
            font-size: 0.85rem;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 768px) {
            .container, section, header, footer, .nav-mobile {
                padding-left: 32px;
                padding-right: 32px;
            }

            section + section {
                margin-top: 60px;
            }

            header {
                padding-top: 24px;
                padding-bottom: 24px;
            }

            .nav-desktop {
                display: none;
            }

            .hamburger {
                display: flex;
            }

            .hero-grid {
                grid-template-columns: 1fr;
            }

            .hero-right {
                transform: rotate(0deg);
                margin-top: 24px;
            }

            .hero-left h1 {
                font-size: clamp(3rem, 12vw, 4.5rem);
            }

            .content-block {
                grid-template-columns: 1fr;
                gap: 32px;
            }

            .content-block.reverse {
                direction: ltr;
            }

            .phone-block a {
                font-size: 2.2rem;
                padding: 12px 32px;
            }

            .footer-grid {
                grid-template-columns: 1fr;
                gap: 32px;
                text-align: center;
            }

            .overlap-left, .overlap-right {
                margin-left: 0;
                margin-right: 0;
            }

            .reviews-grid {
                grid-template-columns: 1fr;
            }

            .stat-number {
                font-size: 3rem;
            }

            .hero-cta {
                font-size: 1.5rem;
                padding: 16px 32px;
            }

            .skew-left, .skew-right {
                transform: none;
            }
        }

        @media (max-width: 480px) {
            .container, section, header, footer, .nav-mobile {
                padding-left: 20px;
                padding-right: 20px;
            }

            .logo {
                font-size: 1.6rem;
                padding: 8px 16px;
            }

            h1 {
                font-size: 2.8rem;
            }

            .block-card, .accent-block {
                padding: 24px 16px;
            }
        }
